<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		.form {
			flex: 1 0 auto;
			display: flex;
			flex-direction: column;

			@media (max-width: 1200px) {
				padding: 0 20px;
			}

			&__logo {
				margin-top: 31px;
				margin-left: 42px;
			}

			&__content {
				padding-top: 102px;
				padding-bottom: 102px;
				width: 100%;
				max-width: 431px;
				align-self: center;
			}

			&__title {
				font-weight: 500;
				font-size: 30px;
				line-height: 45px;
				color: #000000;
				display: block;
				margin-bottom: 22px;
			}

			&__subtitle {
				font-weight: 400;
				font-size: 16px;
				line-height: 24px;
				color: #000000;
				margin-bottom: 6px;

				&:last-of-type {
					margin-bottom: 52px;
				}
			}

			&__link {
				font-weight: 600;
				font-size: 16px;
				line-height: 24px;
				color: #0c21c1;
			}
		}

		.logo {
			font-weight: 600;
			font-size: 20px;
			line-height: 30px;
			color: #000000;
		}

		.input-box {
			margin-bottom: 49px;

			&:last-of-type {
				margin-bottom: 0;
			}

			&__info {
				display: block;
				margin-bottom: 11px;
				font-weight: 500;
				font-size: 13px;
				line-height: 20px;
				color: #999999;
				user-select: none;
			}

			&>input {
				box-sizing: border-box;
				position: relative;
				width: 100%;
				border-bottom: 2px solid #999999;
				padding-bottom: 9px;
				padding-left: 27px;
				color: #000842;

				&:focus {
					border-bottom: 2px solid #000842;
				}
			}

			&__icon {
				position: absolute;
				user-select: none;
			}
		}

		.btn-box {
			margin-top: 109px;

			&>button {
				background: #0c21c1;
				box-shadow: 0px 4px 26px rgba(0, 0, 0, 0.25);
				border-radius: 32px;
				font-weight: 500;
				font-size: 17px;
				line-height: 26px;
				color: #ffffff;
				width: 100%;
				padding-top: 14px;
				padding-bottom: 14px;
				text-align: center;
				cursor: pointer;
			}
		}

		.form-box {
			&__social {
				margin-top: 39px;
				display: flex;
				flex-direction: column;
				align-items: center;

				&-info {
					font-weight: 500;
					font-size: 16px;
					line-height: 24px;
					color: #b5b5b5;
					margin-bottom: 31px;
				}

				&-items {
					display: flex;

					&>a {
						margin-right: 20px;

						&:last-of-type {
							margin-right: 0;
						}
					}
				}
			}
		}
	</style>
</head>

<body>
	<div class="container">
		<section class="form">
			<a href="#" class="form__logo logo">Your Logo</a>
			<div class="form__content">
				<h1 class="form__title">Sign in</h1>
				<p class="form__subtitle">If you don’t have an account register</p>
				<p class="form__subtitle">
					You can
					<a href="./sign-up.html" class="form__link"> Register here !</a>
				</p>
				<form action="#" class="form__form-box form-box">
					<div class="form-box__input-box input-box">
						<label class="input-box__info" for="email">Email</label>
						<label class="input-box__icon" for="email"><img src="./image/svg/email.svg" alt="email" /></label>
						<input type="email" name="email" id="email" placeholder="Enter your email address" />
					</div>
					<div class="form-box__input-box input-box">
						<label class="input-box__info" for="password">Password</label>
						<label class="input-box__icon" for="password"><img src="./image/svg/password.svg"
								alt="password" /></label>
						<input type="password" name="password" id="password" placeholder="Enter your password" />
					</div>
					<div class="form-box__btn-box btn-box">
						<button type="submit">Login</button>
					</div>
					<div class="form-box__social">
						<span class="form-box__social-info">or continue with</span>
						<div class="form-box__social-items">
							<a href="#"><img src="./image/svg/facebook.svg" alt="facebook" /></a>
							<a href="#"><img src="./image/svg/apple.svg" alt="facebook" /></a>
							<a href="#"><img src="./image/svg/google.svg" alt="facebook" /></a>
						</div>
					</div>
				</form>
			</div>
		</section>
		<section class="promo">
			<div class="promo__box">
				<div class="promo__content">
					<img src="./image/Saly.png" alt="Saly" class="promo__image" />
					<h1 class="promo__title">Sign in to name</h1>
					<p class="promo__subtitle">Lorem Ipsum is simply</p>
				</div>
			</div>
		</section>
	</div>
</body>

</html>
